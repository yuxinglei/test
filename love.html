<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给我的宝贝 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fff0f5;
            font-family: "Microsoft Yahei", sans-serif;
            text-align: center;
            padding-top: 80px;
            overflow-x: hidden;
        }
        .title {
            font-size: 28px;
            color: #ff5e8f;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .text {
            font-size: 18px;
            color: #555;
            line-height: 1.8;
            padding: 0 20px;
            margin-bottom: 40px;
        }
        .heart {
            color: #ff477e;
            font-size: 40px;
            animation: beat 1s infinite alternate;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }
        .from {
            margin-top: 60px;
            font-size: 16px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="heart">❤️</div>
<div class="title">致我最爱的宝贝 韩蓉</div>
<div class="text">
    遇见你之后，世界都变得温柔了。<br>
    想把所有的浪漫和偏爱都给你，<br>
    岁岁年年，朝朝暮暮，<br>
    我只想一直陪着你。
</div>
<div class="heart">💌</div>
<div class="from">
    永远爱你的 雷总 ❤️
</div>

</body>
</html>
